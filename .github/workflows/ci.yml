name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**', 'release/**']
  pull_request:
    branches: [main, develop]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # JOB 1: Static Analysis (PHP)
  # ============================================================
  static-analysis:
    name: Static Analysis (PHP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, xml, mbstring, zip, gd, dom
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate

      - name: Run Pint (Code Style Check)
        run: ./vendor/bin/pint --test

  # ============================================================
  # JOB 2: Lint Frontend (Node.js)
  # ============================================================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, xml, mbstring, zip, gd, dom
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate

      - name: Check TypeScript types
        run: npm run types:check

      - name: Check Prettier formatting
        run: npm run format:check

  # ============================================================
  # JOB 3: Unit & Feature Tests
  # ============================================================
  test:
    name: Unit & Feature Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ulasfilm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, xml, mbstring, zip, gd, dom
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Configure database for test
        run: |
          sed -i 's/DB_DATABASE=ulasfilm/DB_DATABASE=ulasfilm_test/' .env
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=mysql/' .env

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate APP key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate

      - name: Run tests
        run: php artisan test --without-tty
        env:
          APP_ENV: testing

  # ============================================================
  # JOB 4: Build Frontend
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, xml, mbstring, zip, gd, dom
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Wayfinder routes
        run: php artisan wayfinder:generate

      - name: Build assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: public/build/
          retention-days: 1

  # ============================================================
  # JOB 5: Security Audit
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run Composer Audit
        run: composer audit --no-interaction

      - name: Run npm audit
        run: npm audit --audit-level=critical

  # ============================================================
  # JOB 6: Merge Gate (Block Merge if Failed)
  # ============================================================
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [static-analysis, frontend-lint, test, build-frontend, security]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Merge Gate Check
        run: |
          echo "============================================"
          echo "  MERGE GATE CHECK"
          echo "============================================"
          echo "Static Analysis: ${{ needs.static-analysis.result }}"
          echo "Frontend Lint:   ${{ needs.frontend-lint.result }}"
          echo "Tests:           ${{ needs.test.result }}"
          echo "Build:           ${{ needs.build-frontend.result }}"
          echo "Security:        ${{ needs.security.result }}"
          echo "============================================"
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-frontend.result }}" != "success" ]; then
            echo "❌ MERGE BLOCKED - Tests or Build failed"
            exit 1
          fi
          echo "✅ ALL CHECKS PASSED - MERGE APPROVED"

# ============================================================
# BRANCH PROTECTION RULE (setup di GitHub Settings):
# ✅ Require pull request before merging to main/develop
# ✅ Require status checks to pass before merge
# ✅ Dismiss stale reviews
# ✅ Do not allow bypassing the above rules
# ============================================================
