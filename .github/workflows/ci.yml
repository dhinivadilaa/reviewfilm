name: CI Pipeline - Web Review Film

on:
  push:
    branches: [master, develop, 'feature/**']
  pull_request:
    branches: [master, develop]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # JOB 1: Code Style (PHP Pint)
  # ============================================================
  code-style:
    name: Code Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, dom
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run Pint (Code Style)
        run: ./vendor/bin/pint --test

  # ============================================================
  # JOB 2: Frontend Lint & Type Check
  # ============================================================
  frontend-check:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm Dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npm run types:check

      - name: Prettier Format Check
        run: npm run format:check

      - name: ESLint Check
        run: npm run lint:check

  # ============================================================
  # JOB 3: Unit & Feature Tests
  # ============================================================
  tests:
    name: Unit & Feature Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, xml, dom
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate App Key
        run: php artisan key:generate

      - name: Run Migrations (SQLite)
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

      - name: Run Tests
        run: ./vendor/bin/pest --ci
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'

  # ============================================================
  # JOB 4: Build Frontend
  # ============================================================
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, dom
          coverage: none

      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 3

  # ============================================================
  # JOB 5: Security Audit
  # ============================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install Composer Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Composer Security Audit
        run: composer audit --no-interaction

      - name: npm Security Audit
        run: npm audit --audit-level=high

  # ============================================================
  # JOB 6: Merge Gate — wajib hijau sebelum merge ke master
  # ============================================================
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    needs: [code-style, frontend-check, tests, build, security]
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    steps:
      - name: All Checks Passed
        run: |
          echo "✅ code-style  : ${{ needs.code-style.result }}"
          echo "✅ frontend     : ${{ needs.frontend-check.result }}"
          echo "✅ tests        : ${{ needs.tests.result }}"
          echo "✅ build        : ${{ needs.build.result }}"
          echo "✅ security     : ${{ needs.security.result }}"
          if [ "${{ needs.tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.code-style.result }}" != "success" ]; then
            echo "❌ MERGE BLOCKED"
            exit 1
          fi
          echo "🚀 MERGE APPROVED"
